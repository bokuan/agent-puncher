<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AGENT PUNCHER</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AGENT PUNCHER</h1>

    <div class="section">
      <h2>Configuration</h2>
      <form id="config-form">
        <div class="form-group">
          <label for="base_url">API Base URL</label>
          <input type="text" id="base_url" name="base_url" required />
        </div>
        <div class="form-group">
          <label for="api_key">API Key</label>
          <input type="password" id="api_key" name="api_key" required />
        </div>
      </form>
      <div class="api-key-section">
        <h3>API Key for Agent Puncher</h3>
        <div class="form-group">
          <label for="current_api_key">Current API Key</label>
          <input type="text" id="current_api_key" name="current_api_key" readonly />
        </div>
        <button id="generate-api-key-btn" class="btn">Generate New API Key</button>
        <span id="api-key-status" class="status-text"></span>
        <button type="submit" form="config-form" class="btn">Save Configuration</button>
        <span id="config-status" class="status-text"></span>
      </div>
    </div>

    <div class="section">
      <h2>Chat Interface</h2>
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="form-group">
          <label for="web_model">Chat Model</label>
          <input type="text" id="web_model" name="web_model" placeholder="" />
        </div>
        <div class="form-group">
          <textarea id="prompt" placeholder="Enter your prompt here..."></textarea>
        </div>
        <button id="send-btn" class="btn">Send</button>
        <div id="loading" class="loading-wrapper" style="display: none;">
          <div class="loading"></div> Processing...
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Logs</h2>
      <div id="logs"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
